services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gestionrenta
      POSTGRES_PASSWORD: ${DB_PASSWORD:-GestionRenta2025!}
      POSTGRES_DB: gestionrenta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestionrenta"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://gestionrenta:${DB_PASSWORD:-GestionRenta2025!}@db:5432/gestionrenta
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://declaraciones.gestionxpress.app}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
